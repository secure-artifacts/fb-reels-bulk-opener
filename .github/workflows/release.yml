name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 纯静态扩展，无需构建步骤，直接打包根目录
      - name: Package Extension
        run: |
          zip -r fb-reels-bulk-opener-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
