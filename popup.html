<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 300px;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fff;
    color: #1c1e21;
    overflow: hidden;
  }

  /* ── Header ── */
  .hd {
    background: linear-gradient(135deg, #1877F2 0%, #0a5fd4 100%);
    padding: 16px 18px 14px;
    position: relative;
    overflow: hidden;
  }
  .hd::before {
    content: '';
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
    top: -38px; right: -25px;
  }
  .hd-row { display: flex; align-items: center; gap: 10px; position: relative; }
  .hd-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.2);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .hd h1 { font-size: 14px; font-weight: 700; color: #fff; }
  .hd p  { font-size: 10px; color: rgba(255,255,255,.75); margin-top: 2px; }

  /* ── 单书签 pill ── */
  .src-pill {
    display: none;
    align-items: center;
    gap: 4px;
    margin-top: 9px;
    position: relative;
    background: rgba(255,255,255,.15);
    border-radius: 7px;
    padding: 5px 9px;
    font-size: 10.5px;
    color: #fff;
  }
  .src-pill.show { display: flex; }
  .src-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: .85; font-size: 10px; }
  .src-badge { background: rgba(255,255,255,.25); border-radius: 99px; padding: 1px 7px; font-size: 9px; font-weight: 700; }

  /* ── 多书签区域 ── */
  .multi-area { display: none; margin-top: 9px; position: relative; }
  .multi-area.show { display: block; }

  .multi-warn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,200,0,.2);
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 10px;
    color: #fff3b0;
    margin-bottom: 6px;
  }
  .multi-count {
    background: rgba(255,255,255,.25);
    border-radius: 99px;
    padding: 1px 7px;
    font-size: 9px; font-weight: 700; color: #fff;
    margin-left: auto; white-space: nowrap;
  }

  .bk-list { display: flex; flex-direction: column; gap: 4px; }

  .bk-item {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.12);
    border-radius: 7px;
    padding: 5px 8px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .15s;
  }
  .bk-item.selected {
    background: rgba(255,255,255,.25);
    border-color: rgba(255,255,255,.55);
  }
  .bk-radio {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .bk-item.selected .bk-radio {
    border-color: #fff;
    background: #fff;
  }
  .bk-item.selected .bk-radio::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1877F2;
  }
  .bk-text { flex: 1; overflow: hidden; }
  .bk-name { font-size: 10.5px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-url  { font-size: 9px; color: rgba(255,255,255,.65); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-default-tag {
    font-size: 8px; font-weight: 700;
    background: rgba(255,255,255,.3);
    color: #fff;
    border-radius: 4px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  /* ── Body ── */
  .bd { padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 12px; }
  .divider { height: 0.5px; background: #e4e6eb; }

  .section-label { font-size: 10.5px; font-weight: 600; color: #65676b; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 7px; }
  .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .label-hint { font-size: 9.5px; color: #90949c; font-weight: 400; }

  /* ── 数量控制 ── */
  .cnt-ctrl {
    display: flex; align-items: center; justify-content: space-between;
    background: #f0f2f5; border-radius: 11px; padding: 3px; gap: 3px;
  }
  .cnt-btn {
    width: 38px; height: 38px; border: none; background: #fff; border-radius: 8px;
    font-size: 18px; font-weight: 300; cursor: pointer; color: #1877F2;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: all .15s; flex-shrink: 0;
  }
  .cnt-btn:hover { background: #e8f0fe; transform: scale(1.05); }
  .cnt-btn:active { transform: scale(.95); }
  .cnt-display { flex: 1; text-align: center; }
  .cnt-num { font-size: 26px; font-weight: 800; color: #1877F2; line-height: 1; display: block; }
  .cnt-sub { font-size: 9px; color: #90949c; margin-top: 1px; }

  /* ── 快捷数量 ── */
  .quick-btns { display: flex; gap: 5px; }
  .qbtn {
    flex: 1; padding: 4px 0;
    border: 1.5px solid #dce0e6; background: #fff;
    border-radius: 6px; font-size: 11px; font-weight: 600; color: #65676b;
    cursor: pointer; transition: all .15s; text-align: center;
  }
  .qbtn:hover, .qbtn.active { border-color: #1877F2; color: #1877F2; background: #e8f0fe; }

  /* ── 速度选择 ── */
  .speed-opts { display: flex; gap: 7px; }
  .speed-opt {
    flex: 1; border: 1.5px solid #dce0e6; background: #fff;
    border-radius: 10px; padding: 9px 8px; cursor: pointer;
    transition: all .15s; position: relative;
  }
  .speed-opt:hover { border-color: #b0bec5; }
  .speed-opt.active { border-color: #1877F2; background: #f0f5ff; }
  .speed-opt.fast.active { border-color: #e0700a; background: #fff3e0; }
  .speed-icon { font-size: 16px; margin-bottom: 3px; }
  .speed-name { font-size: 11px; font-weight: 700; color: #1c1e21; }
  .speed-opt.active:not(.fast) .speed-name { color: #1877F2; }
  .speed-opt.fast.active .speed-name { color: #c45b00; }
  .speed-desc { font-size: 9px; color: #65676b; margin-top: 1px; line-height: 1.3; }
  .speed-badge {
    position: absolute; top: 5px; right: 5px;
    font-size: 8px; font-weight: 700; border-radius: 4px; padding: 1px 5px;
  }
  .speed-opt:not(.fast) .speed-badge { background: #e8f0fe; color: #1877F2; }
  .speed-opt.fast .speed-badge { background: #fff3e0; color: #c45b00; }

  /* ── 状态提示 ── */
  #statusMsg {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 500;
  }
  #statusMsg.warn { background: #fff8e1; color: #a56c00; display: flex; }
  #statusMsg.err  { background: #fce8e6; color: #c5221f; display: flex; }
  #statusMsg.ok   { background: #e6f4ea; color: #1e7e34; display: flex; }

  /* ── 开始按钮 ── */
  #btnGo {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, #1877F2, #0a5fd4);
    color: #fff; border: none; border-radius: 11px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 4px 14px rgba(24,119,242,.3);
    transition: all .2s; letter-spacing: .3px;
  }
  #btnGo:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(24,119,242,.4); }
  #btnGo:active:not(:disabled) { transform: translateY(0); }
  #btnGo:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none; }
  #btnGo.fast-mode { background: linear-gradient(135deg, #e0700a, #c45500); box-shadow: 0 4px 14px rgba(200,80,0,.3); }
  #btnGo.fast-mode:hover:not(:disabled) { box-shadow: 0 6px 18px rgba(200,80,0,.4); }

  /* ── Footer ── */
  .ft {
    padding: 0 16px 12px;
    font-size: 9.5px; color: #bbb; text-align: center; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-row">
    <div class="hd-icon">🎬</div>
    <div>
      <h1>FB Reels 批量开启</h1>
      <p>自动识别书签 · 一键批量打开</p>
    </div>
  </div>

  <!-- 单书签时显示 -->
  <div class="src-pill" id="srcPill">
    <span id="srcIcon">🔖</span>
    <span class="src-url" id="srcUrl"></span>
    <span class="src-badge" id="srcBadge">书签</span>
  </div>

  <!-- 多书签时显示 -->
  <div class="multi-area" id="multiArea">
    <div class="multi-warn">
      <span>⚠️</span>
      <span>检测到多个 Reels 书签，请选择要打开的链接</span>
      <span class="multi-count" id="multiCount"></span>
    </div>
    <div class="bk-list" id="bkList"></div>
  </div>
</div>

<div class="bd">

  <!-- 数量 -->
  <div>
    <div class="label-row">
      <div class="section-label">打开数量</div>
      <span class="label-hint">最多 20 个</span>
    </div>
    <div class="cnt-ctrl">
      <button class="cnt-btn" id="btnMinus">−</button>
      <div class="cnt-display">
        <span class="cnt-num" id="numDisplay">5</span>
        <div class="cnt-sub">个标签页</div>
      </div>
      <button class="cnt-btn" id="btnPlus">＋</button>
    </div>
    <div class="quick-btns" id="quickBtns" style="margin-top:7px;">
      <button class="qbtn" data-n="3">3</button>
      <button class="qbtn" data-n="5">5</button>
      <button class="qbtn" data-n="8">8</button>
      <button class="qbtn" data-n="10">10</button>
      <button class="qbtn" data-n="15">15</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 速度 -->
  <div>
    <div class="section-label">打开速度</div>
    <div class="speed-opts">
      <div class="speed-opt active" id="optNormal">
        <span class="speed-badge">默认</span>
        <div class="speed-icon">🐢</div>
        <div class="speed-name">正常模式</div>
        <div class="speed-desc">每隔 1~1.5 秒<br>模拟真人操作</div>
      </div>
      <div class="speed-opt fast" id="optFast">
        <span class="speed-badge">极速</span>
        <div class="speed-icon">⚡</div>
        <div class="speed-name">极速模式</div>
        <div class="speed-desc">1 秒内全部<br>同时打开</div>
      </div>
    </div>
  </div>

  <!-- 状态 -->
  <div id="statusMsg"></div>

  <!-- 开始 -->
  <button id="btnGo">🚀 立即批量打开</button>

</div>

<div class="ft">正常模式间隔 1~1.5 秒 · 极速模式瞬间全开</div>

<script src="popup.js"></script>
</body>
</html>
