<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fff; color: #1c1e21; overflow: hidden;
  }

  /* ── 页面切换 ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Header ── */
  .hd {
    background: linear-gradient(135deg, #1877F2 0%, #0a5fd4 100%);
    padding: 16px 18px 14px; position: relative; overflow: hidden;
  }
  .hd::before { content:''; position:absolute; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.07); top:-38px; right:-25px; }
  .hd-row { display: flex; align-items: center; gap: 10px; position: relative; }
  .hd-icon { width: 36px; height: 36px; background: rgba(255,255,255,.2); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hd h1 { font-size: 14px; font-weight: 700; color: #fff; }
  .hd p  { font-size: 10px; color: rgba(255,255,255,.75); margin-top: 2px; }
  .hd-gear {
    margin-left: auto; flex-shrink: 0;
    width: 28px; height: 28px; border-radius: 7px;
    background: rgba(255,255,255,.15); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.85); transition: background .15s;
  }
  .hd-gear:hover { background: rgba(255,255,255,.28); }
  .hd-gear svg { width: 15px; height: 15px; }

  /* ── 主页检测卡片区 ── */
  .auto-card { display: none; align-items: center; gap: 9px; margin-top: 10px; background: rgba(255,255,255,.13); border-radius: 10px; padding: 9px 11px; }
  .auto-card.show { display: flex; }
  .auto-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(255,255,255,.5); background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .auto-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .auto-right { flex: 1; min-width: 0; overflow: hidden; }
  .auto-top { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .auto-name { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .auto-bot { display: flex; align-items: center; gap: 5px; }
  .auto-url { font-size: 8px; color: rgba(255,255,255,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .badge-auto { font-size: 8px; font-weight: 700; background: rgba(52,211,153,.35); color: #d1fae5; border-radius: 4px; padding: 2px 6px; flex-shrink: 0; }

  /* 登录条 */
  .login-bar { display: none; align-items: center; gap: 6px; margin-top: 10px; background: rgba(255,255,255,.1); border-radius: 8px; padding: 7px 10px; }
  .login-bar.show { display: flex; }
  .login-icon { flex-shrink: 0; display: flex; align-items: center; }
  .login-label { font-size: 10px; color: rgba(255,255,255,.55); flex-shrink: 0; white-space: nowrap; }
  .login-name { font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .login-hint { font-size: 8px; color: rgba(255,255,255,.35); flex-shrink: 0; margin-left: -2px; }

  /* 公共主页ID 标签 */
  .page-id { display: none; margin-left: auto; flex-shrink: 0; align-items: center; gap: 3px; font-size: 8px; font-weight: 600; background: rgba(255,255,255,.18); color: rgba(255,255,255,.85); border-radius: 4px; padding: 2.5px 6px; cursor: pointer; white-space: nowrap; transition: all .15s; position: relative; }
  .page-id.show { display: inline-flex; }
  .page-id:hover { background: rgba(255,255,255,.3); }
  .page-id.copied { background: rgba(52,211,153,.5); color: #fff; }
  .page-id-tip { display: none; position: absolute; bottom: calc(100% + 7px); right: 0; background: rgba(0,0,0,.88); color: #fff; font-size: 9px; font-weight: 400; padding: 5px 10px; border-radius: 5px; white-space: nowrap; z-index: 10; pointer-events: none; }
  .page-id-tip::after { content: ''; position: absolute; top: 100%; right: 12px; border: 5px solid transparent; border-top-color: rgba(0,0,0,.88); }
  .page-id:hover .page-id-tip { display: block; }

  /* 书签 pill */
  .src-pill { display: none; align-items: center; gap: 9px; margin-top: 10px; background: rgba(255,255,255,.15); border-radius: 10px; padding: 9px 11px; }
  .src-pill.show { display: flex; }
  .pill-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(255,255,255,.5); background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .pill-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pill-right { flex: 1; min-width: 0; overflow: hidden; }
  .pill-name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .pill-name { font-size: 12px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge-bk { font-size: 8px; font-weight: 700; background: rgba(255,255,255,.2); color: rgba(255,255,255,.7); border-radius: 4px; padding: 2px 6px; flex-shrink: 0; }
  .pill-url { font-size: 8px; color: rgba(255,255,255,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 多书签 */
  .multi-area { display: none; margin-top: 9px; position: relative; }
  .multi-area.show { display: block; }
  .multi-warn { display: flex; align-items: center; gap: 5px; background: rgba(255,200,0,.2); border-radius: 6px; padding: 5px 9px; font-size: 10px; color: #fff3b0; margin-bottom: 6px; }
  .multi-count { background: rgba(255,255,255,.25); border-radius: 99px; padding: 1px 7px; font-size: 9px; font-weight: 700; color: #fff; margin-left: auto; white-space: nowrap; }
  .bk-list { display: flex; flex-direction: column; gap: 5px; }
  .bk-list::-webkit-scrollbar { width: 3px; }
  .bk-list::-webkit-scrollbar-track { background: transparent; }
  .bk-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 99px; }
  .bk-item { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.12); border-radius: 9px; padding: 7px 9px; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; flex-shrink: 0; }
  .bk-item.selected { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.55); }
  .bk-radio { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.5); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
  .bk-item.selected .bk-radio { border-color: #fff; background: #fff; }
  .bk-item.selected .bk-radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #1877F2; }
  .bk-avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.35); background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .bk-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .bk-name { flex: 1; font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-default-tag { font-size: 8px; font-weight: 700; background: rgba(255,255,255,.3); color: #fff; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; }
  .selected-url { display: none; margin-top: 6px; background: rgba(0,0,0,.15); border-radius: 6px; padding: 5px 9px; font-size: 8.5px; color: rgba(255,255,255,.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .selected-url.show { display: block; }

  /* ── 主体 ── */
  .bd { padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 12px; }
  .divider { height: 0.5px; background: #e4e6eb; }
  .section-label { font-size: 10.5px; font-weight: 600; color: #65676b; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 7px; }
  .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .label-hint { font-size: 9.5px; color: #90949c; }

  .cnt-ctrl { display: flex; align-items: center; justify-content: space-between; background: #f0f2f5; border-radius: 11px; padding: 3px; gap: 3px; }
  .cnt-btn { width: 38px; height: 38px; border: none; background: #fff; border-radius: 8px; font-size: 18px; font-weight: 300; cursor: pointer; color: #1877F2; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: all .15s; flex-shrink: 0; }
  .cnt-btn:hover { background: #e8f0fe; transform: scale(1.05); }
  .cnt-btn:active { transform: scale(.95); }
  .cnt-display { flex: 1; text-align: center; }
  .cnt-num { font-size: 26px; font-weight: 800; color: #1877F2; line-height: 1; display: block; }
  .cnt-sub { font-size: 9px; color: #90949c; margin-top: 1px; }

  .quick-btns { display: flex; gap: 5px; }
  .qbtn { flex: 1; padding: 4px 0; border: 1.5px solid #dce0e6; background: #fff; border-radius: 6px; font-size: 11px; font-weight: 600; color: #65676b; cursor: pointer; transition: all .15s; text-align: center; }
  .qbtn:hover, .qbtn.active { border-color: #1877F2; color: #1877F2; background: #e8f0fe; }

  #updateBar { display: none; align-items: center; gap: 8px; background: #fff8e1; border-radius: 8px; padding: 8px 10px; border: 1px solid #ffd966; }
  #updateBar.show { display: flex; }
  #updateBar .ub-icon { font-size: 14px; flex-shrink: 0; }
  #updateBar .ub-text { flex: 1; }
  #updateBar .ub-title { font-size: 11px; font-weight: 700; color: #a56c00; }
  #updateBar .ub-sub { font-size: 9.5px; color: #b07800; margin-top: 1px; }
  #updateBar .ub-btn { font-size: 10px; font-weight: 700; color: #fff; background: #e0700a; border-radius: 6px; padding: 4px 10px; flex-shrink: 0; cursor: pointer; border: none; }

  #statusMsg { display: none; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 500; }
  #statusMsg.warn { background: #fff8e1; color: #a56c00; display: flex; }
  #statusMsg.err  { background: #fce8e6; color: #c5221f; display: flex; }
  #statusMsg.ok   { background: #e6f4ea; color: #1e7e34; display: flex; }

  #btnGo { width: 100%; padding: 11px; background: linear-gradient(135deg, #1877F2, #0a5fd4); color: #fff; border: none; border-radius: 11px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 14px rgba(24,119,242,.3); transition: all .2s; letter-spacing: .3px; }
  #btnGo:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(24,119,242,.4); }
  #btnGo:active:not(:disabled) { transform: translateY(0); }
  #btnGo:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none; }

  .ft { padding: 8px 16px 11px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  #ftVersion { font-size: 10px; color: #c0c4cc; font-weight: 600; transition: color .2s; }
  #ftVersion.clickable { cursor: pointer; }
  #ftVersion.clickable:hover { color: #1877F2; }
  #ftDot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: #d1d5db; transition: background .2s; }
  #ftDot.ok   { background: #34d399; }
  #ftDot.new  { background: #fbbf24; }
  #ftDot.beta { background: #a78bfa; }
  #ftDot.err  { background: #d1d5db; }

  /* ══════════════════════════════════════
     设置页面
  ══════════════════════════════════════ */
  .set-hd {
    background: linear-gradient(135deg, #1877F2 0%, #0a5fd4 100%);
    padding: 14px 16px 12px; position: relative; overflow: hidden;
  }
  .set-hd::before { content:''; position:absolute; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.07); top:-38px; right:-25px; }
  .set-hd-row { display: flex; align-items: center; gap: 9px; position: relative; }
  .set-back {
    width: 28px; height: 28px; border-radius: 7px;
    background: rgba(255,255,255,.18); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #fff; transition: background .15s;
  }
  .set-back:hover { background: rgba(255,255,255,.3); }
  .set-back svg { width: 14px; height: 14px; }
  .set-hd-title { font-size: 13px; font-weight: 700; color: #fff; }
  .set-hd-sub   { font-size: 9px; color: rgba(255,255,255,.6); margin-top: 1px; }

  .set-bd { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 14px; }
  .set-section-label { font-size: 9.5px; font-weight: 700; color: #65676b; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 7px; }

  .set-card { background: #f7f8fa; border-radius: 10px; overflow: hidden; border: 0.5px solid #e4e6eb; }
  .set-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-bottom: 0.5px solid #e4e6eb;
  }
  .set-row:last-child { border-bottom: none; }
  .set-row-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .set-row-icon svg { width: 15px; height: 15px; }
  .set-row-icon { font-size: 14px; line-height: 1; }
  .set-row-icon.blue   { background: #e8f0fe; color: #1877F2; }
  .set-row-icon.orange { background: #fff3e0; color: #e0700a; }
  .set-row-icon.green  { background: #e6f4ea; color: #1e7e34; }
  .set-row-icon.purple { background: #f3e8ff; color: #7c3aed; }
  .set-row-icon.gray   { background: #f0f2f5; color: #65676b; }
  .set-row-body { flex: 1; min-width: 0; }
  .set-row-name { font-size: 12px; font-weight: 600; color: #1c1e21; }
  .set-row-desc { font-size: 10px; color: #65676b; margin-top: 1px; line-height: 1.4; }

  .set-forced-on {
    font-size: 9px; font-weight: 700; color: #1e7e34;
    background: #e6f4ea; border-radius: 99px; padding: 3px 9px;
    flex-shrink: 0; white-space: nowrap;
  }

  /* Toggle */
  .tog {
    width: 34px; height: 20px; border-radius: 10px;
    background: #d1d5db; border: none; cursor: pointer;
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  .tog.on { background: #1877F2; }
  .tog::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .tog.on::after { transform: translateX(14px); }

  .set-ft { padding: 7px 14px 12px; text-align: center; font-size: 10px; color: #c0c4cc; }
</style>
</head>
<body>

<!-- ══════════════════ 主页面 ══════════════════ -->
<div class="page active" id="pageMain">

<div class="hd">
  <div class="hd-row">
    <div class="hd-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2"  y="4" width="3" height="12" rx="1.5" fill="white"/>
        <rect x="7"  y="2" width="3" height="16" rx="1.5" fill="white" opacity="0.85"/>
        <rect x="12" y="5" width="3" height="10" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="17" y="3" width="3" height="14" rx="1.5" fill="white" opacity="0.55"/>
      </svg>
    </div>
    <div>
      <h1>FB Reels 批量开启</h1>
      <p>自动识别专业主页 · 一键批量打开</p>
    </div>
    <button class="hd-gear" id="btnGear" title="偏好设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 自动检测卡片 -->
  <div class="auto-card" id="autoCard">
    <div class="auto-avatar" id="autoAvatar"></div>
    <div class="auto-right">
      <div class="auto-top">
        <span class="auto-name" id="autoName"></span>
        <span class="page-id" id="autoPageId">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="page-id-text">公共主页ID</span>
          <span class="page-id-tip" id="autoPageIdTip"></span>
        </span>
      </div>
      <div class="auto-bot">
        <span class="auto-url" id="autoUrl"></span>
        <span class="badge-auto">自动检测</span>
      </div>
    </div>
  </div>

  <!-- 登录条 -->
  <div class="login-bar" id="loginBar">
    <div class="login-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <span class="login-label">当前登录:</span>
    <span class="login-name" id="loginName"></span>
    <span class="login-hint" id="loginHint"></span>
    <span class="page-id" id="loginPageId">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="page-id-text">公共主页ID</span>
      <span class="page-id-tip" id="loginPageIdTip"></span>
    </span>
  </div>

  <!-- 单书签 pill -->
  <div class="src-pill" id="srcPill">
    <div class="pill-avatar" id="pillAvatar"></div>
    <div class="pill-right">
      <div class="pill-name-row">
        <span class="pill-name" id="pillName"></span>
        <span class="page-id" id="pillPageId">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span class="page-id-text">公共主页ID</span>
          <span class="page-id-tip" id="pillPageIdTip"></span>
        </span>
      </div>
      <div class="auto-bot">
        <span class="pill-url" id="pillUrl"></span>
        <span class="badge-bk">书签识别</span>
      </div>
    </div>
  </div>

  <!-- 多书签 -->
  <div class="multi-area" id="multiArea">
    <div class="multi-warn">
      <span>⚠️</span>
      <span>检测到多个 Reels 书签，默认选择第一个</span>
      <span class="multi-count" id="multiCount"></span>
    </div>
    <div class="bk-list" id="bkList"></div>
    <div class="selected-url" id="selectedUrl"></div>
  </div>
</div>

<div class="bd">
  <div id="updateBar">
    <div class="ub-icon">🎉</div>
    <div class="ub-text">
      <div class="ub-title" id="updateTitle">发现新版本</div>
      <div class="ub-sub">点击前往 GitHub 下载更新</div>
    </div>
    <button class="ub-btn" id="updateGoBtn">更新</button>
  </div>

  <div>
    <div class="label-row">
      <div class="section-label">打开数量</div>
      <span class="label-hint">最多 30 个</span>
    </div>
    <div class="cnt-ctrl">
      <button class="cnt-btn" id="btnMinus">−</button>
      <div class="cnt-display">
        <span class="cnt-num" id="numDisplay">5</span>
        <div class="cnt-sub">个标签页</div>
      </div>
      <button class="cnt-btn" id="btnPlus">＋</button>
    </div>
    <div class="quick-btns" id="quickBtns" style="margin-top:7px;">
      <button class="qbtn" data-n="3">3</button>
      <button class="qbtn" data-n="5">5</button>
      <button class="qbtn" data-n="8">8</button>
      <button class="qbtn" data-n="10">10</button>
      <button class="qbtn" data-n="15">15</button>
    </div>
  </div>

  <div id="statusMsg"></div>
  <button id="btnGo">快速批量打开</button>
</div>

<div class="ft">
  <span id="ftVersion">v3.0</span>
  <span id="ftDot" title="正在检测更新…"></span>
</div>

</div><!-- /pageMain -->


<!-- ══════════════════ 设置页面 ══════════════════ -->
<div class="page" id="pageSettings">

<div class="set-hd">
  <div class="set-hd-row">
    <button class="set-back" id="btnBack" title="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div>
      <div class="set-hd-title">偏好设置</div>
      <div class="set-hd-sub">更改即时保存，下次直接生效</div>
    </div>
  </div>
</div>

<div class="set-bd">

  <!-- 前置任务 -->
  <div>
    <div class="set-section-label">前置任务</div>
    <div class="set-card">
      <div class="set-row">
        <div class="set-row-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="set-row-body">
          <div class="set-row-name">自动打开日程本</div>
          <div class="set-row-desc">批量开启前先打开内容日历</div>
        </div>
        <button class="tog on" id="togCalendar" aria-label="开关"></button>
      </div>
    </div>
  </div>

  <!-- 更新 -->
  <div>
    <div class="set-section-label">更新与通知</div>
    <div class="set-card">
      <div class="set-row">
        <div class="set-row-icon gray">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </div>
        <div class="set-row-body">
          <div class="set-row-name">启动时检测更新</div>
          <div class="set-row-desc">始终开启，自动联网检测最新版本</div>
        </div>
        <span class="set-forced-on">已开启</span>
      </div>
    </div>
  </div>

  <!-- 反馈 -->
  <div>
    <div class="set-section-label">反馈与支持</div>
    <div class="set-card">
      <div class="set-row" id="rowFeedback" style="cursor:pointer;">
        <div class="set-row-icon blue">💬</div>
        <div class="set-row-body">
          <div class="set-row-name">问题反馈 / 建议</div>
          <div class="set-row-desc">遇到问题或有想法？点击提交反馈表单</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#90949c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>

</div>

<div class="set-ft" id="setFt">v3.0 · 设置已自动保存</div>

</div><!-- /pageSettings -->

<script src="popup.js"></script>
